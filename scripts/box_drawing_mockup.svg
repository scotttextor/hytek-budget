<text x="65" y="632" font-size="13" font-weight="700" fill="#1a202c">Factory operator instructions:</text>
<text x="65" y="652" font-size="12" fill="#374151">1. Lay B1 main chord on bench  ·  2. Slide B1(Box1) into the orange-hatched zone  ·  3. Push until dimples snap (you'll feel the click)</text>
<text x="65" y="670" font-size="12" fill="#374151">4. Verify both pairs of dimples are engaged  ·  5. Continue with web placement (green dots = web positions on B1)</text>
