<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1100" viewBox="0 0 1900 1100" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="galv" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#eef2f6"/>
    <stop offset="25%" stop-color="#dee3e9"/>
    <stop offset="60%" stop-color="#bcc4cd"/>
    <stop offset="100%" stop-color="#8d959e"/>
  </linearGradient>
  <linearGradient id="lip-strip" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f4f7fa"/>
    <stop offset="100%" stop-color="#a8b0b8"/>
  </linearGradient>
  <radialGradient id="hole-deep" cx="0.4" cy="0.4" r="0.6">
    <stop offset="0%" stop-color="#0a0a0a"/>
    <stop offset="70%" stop-color="#3a3a3a"/>
    <stop offset="100%" stop-color="#5a5a5a"/>
  </radialGradient>
  <radialGradient id="hole-rim" cx="0.5" cy="0.5" r="0.5">
    <stop offset="80%" stop-color="white" stop-opacity="0"/>
    <stop offset="95%" stop-color="white" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>

  <!-- SWAGE - localized embossed lozenge pressed into web -->
  <radialGradient id="swage-press" cx="0.5" cy="0.5" r="0.6">
    <stop offset="0%" stop-color="#5a626c"/>
    <stop offset="40%" stop-color="#6a727c"/>
    <stop offset="80%" stop-color="#a8b0b8"/>
    <stop offset="100%" stop-color="#cad0d7"/>
  </radialGradient>

  <pattern id="spangle" patternUnits="userSpaceOnUse" width="60" height="60">
    <rect width="60" height="60" fill="none"/>
    <ellipse cx="12" cy="18" rx="9" ry="5" fill="white" opacity="0.04" transform="rotate(20 12 18)"/>
    <ellipse cx="42" cy="34" rx="11" ry="6" fill="white" opacity="0.03" transform="rotate(-15 42 34)"/>
    <ellipse cx="22" cy="48" rx="7" ry="4" fill="white" opacity="0.05" transform="rotate(40 22 48)"/>
  </pattern>

  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f8f9fa"/>
    <stop offset="1" stop-color="#dde1e6"/>
  </linearGradient>
</defs>
<filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
<rect width="1900" height="1100" fill="url(#bg)"/>
<text x="30" y="40" font-size="26" font-weight="700" fill="#1a202c">All FrameCAD tools — corrected SWAGE</text>
<text x="30" y="64" font-size="14" fill="#4a5568">F37008 W089 F41-38 spec. Each tool drawn at 4px = 1mm. SWAGE now shown correctly as a lozenge pressing.</text>
<rect x="84" y="135" width="1700.0" height="356" fill="rgba(0,0,0,0.18)" filter="url(#blur)"/>
<rect x="80" y="130" width="1700.0" height="356" fill="url(#galv)"/>
<rect x="80" y="130" width="1700.0" height="356" fill="url(#spangle)" opacity="0.7"/>
<rect x="80" y="130" width="1700.0" height="48" fill="url(#lip-strip)" stroke="#5a626c" stroke-width="0.6"/>
<rect x="80" y="438" width="1700.0" height="48" fill="url(#lip-strip)" stroke="#5a626c" stroke-width="0.6" opacity="0.85"/>
<rect x="80" y="130" width="1700.0" height="356" fill="none" stroke="#3a3f47" stroke-width="1"/>
<line x1="80" y1="130.5" x2="1780.0" y2="130.5" stroke="white" stroke-width="1.2" opacity="0.7"/>
<line x1="80" y1="485.5" x2="1780.0" y2="485.5" stroke="#1f2329" stroke-width="1.2" opacity="0.5"/>
<line x1="50" y1="130" x2="50" y2="486" stroke="#374151" stroke-width="1"/>
<line x1="45" y1="130" x2="55" y2="130" stroke="#374151" stroke-width="1"/>
<line x1="45" y1="486" x2="55" y2="486" stroke="#374151" stroke-width="1"/>
<text x="40" y="313.0" text-anchor="end" font-size="12" font-weight="700" fill="#374151">89 mm</text>
<polygon points="174.0,308.0 190.0,244.0 210.0,244.0 226.0,308.0 210.0,372.0 190.0,372.0" fill="url(#swage-press)" stroke="#3a3f47" stroke-width="0.7"/>
<polyline points="174.0,308.0 190.0,244.0 210.0,244.0 226.0,308.0" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>
<circle cx="440" cy="240.0" r="8.40" fill="url(#hole-rim)"/>
<circle cx="440" cy="240.0" r="7.60" fill="url(#hole-deep)"/>
<circle cx="440" cy="240.0" r="7.60" fill="none" stroke="#000" stroke-width="0.4" opacity="0.6"/>
<circle cx="442.3" cy="242.3" r="1.90" fill="white" opacity="0.55"/>
<circle cx="440" cy="308.0" r="8.40" fill="url(#hole-rim)"/>
<circle cx="440" cy="308.0" r="7.60" fill="url(#hole-deep)"/>
<circle cx="440" cy="308.0" r="7.60" fill="none" stroke="#000" stroke-width="0.4" opacity="0.6"/>
<circle cx="442.3" cy="310.3" r="1.90" fill="white" opacity="0.55"/>
<circle cx="440" cy="376.0" r="8.40" fill="url(#hole-rim)"/>
<circle cx="440" cy="376.0" r="7.60" fill="url(#hole-deep)"/>
<circle cx="440" cy="376.0" r="7.60" fill="none" stroke="#000" stroke-width="0.4" opacity="0.6"/>
<circle cx="442.3" cy="378.3" r="1.90" fill="white" opacity="0.55"/>
<circle cx="720" cy="308.0" r="28.00" fill="url(#hole-rim)"/>
<circle cx="720" cy="308.0" r="27.00" fill="url(#hole-deep)"/>
<circle cx="720" cy="308.0" r="27.00" fill="none" stroke="#000" stroke-width="0.5" opacity="0.6"/>
<circle cx="729.5" cy="317.4" r="6.75" fill="white" opacity="0.55"/>
<polygon points="936.0,130 984.0,130 960,178" fill="url(#bg)" stroke="#1a1a1a" stroke-width="1.2"/>
<polygon points="936.0,486 984.0,486 960,438" fill="url(#bg)" stroke="#1a1a1a" stroke-width="1.2"/>
<rect x="1172.0" y="178" width="56" height="36" fill="url(#bg)" stroke="#1a1a1a" stroke-width="1.2"/>
<rect x="1354.0" y="130" width="12" height="356" fill="url(#bg)" stroke="#1a1a1a" stroke-width="1"/>
<circle cx="1640" cy="308.0" r="65.50" fill="url(#hole-rim)"/>
<circle cx="1640" cy="308.0" r="64.00" fill="url(#hole-deep)"/>
<circle cx="1640" cy="308.0" r="64.00" fill="none" stroke="#000" stroke-width="0.7" opacity="0.6"/>
<ellipse cx="1614.4" cy="276.0" rx="28.8" ry="11.52" fill="white" opacity="0.3" transform="rotate(-30 1614.4 276.0)"/>
<line x1="200" y1="494" x2="200" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="200" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">SWAGE</text>
<text x="200" y="551" text-anchor="middle" font-size="10" fill="#4a5568">lozenge press</text>
<text x="200" y="564" text-anchor="middle" font-size="9" fill="#6b7280">~10 × 32 mm</text>
<line x1="440" y1="494" x2="440" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="440" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 1 — WEB HOLE</text>
<text x="440" y="551" text-anchor="middle" font-size="10" fill="#4a5568">3 × Ø3.8 mm</text>
<text x="440" y="564" text-anchor="middle" font-size="9" fill="#6b7280">17 mm pitch</text>
<line x1="720" y1="494" x2="720" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="720" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 1 — WEB BOLT HOLE</text>
<text x="720" y="551" text-anchor="middle" font-size="10" fill="#4a5568">Ø13.5 mm</text>
<text x="720" y="564" text-anchor="middle" font-size="9" fill="#6b7280">single hole</text>
<line x1="960" y1="494" x2="960" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="960" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 2 — LIP CUT</text>
<text x="960" y="551" text-anchor="middle" font-size="10" fill="#4a5568">V-cut</text>
<text x="960" y="564" text-anchor="middle" font-size="9" fill="#6b7280">into lip</text>
<line x1="1200" y1="494" x2="1200" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="1200" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 2 — WEB NOTCH</text>
<text x="1200" y="551" text-anchor="middle" font-size="10" fill="#4a5568">rectangular</text>
<text x="1200" y="564" text-anchor="middle" font-size="9" fill="#6b7280">~14 × 9 mm</text>
<line x1="1360" y1="494" x2="1360" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="1360" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 3 — FLANGE CUT</text>
<text x="1360" y="551" text-anchor="middle" font-size="10" fill="#4a5568">narrow strip</text>
<text x="1360" y="564" text-anchor="middle" font-size="9" fill="#6b7280">3 mm wide</text>
<line x1="1640" y1="494" x2="1640" y2="528" stroke="#374151" stroke-width="0.6" opacity="0.4"/>
<text x="1640" y="536" text-anchor="middle" font-size="11" fill="#1a202c" font-weight="700">TOOL 3 — SERVICE HOLE</text>
<text x="1640" y="551" text-anchor="middle" font-size="10" fill="#4a5568">Ø32 mm</text>
<text x="1640" y="564" text-anchor="middle" font-size="9" fill="#6b7280">through web</text>
<rect x="80" y="606" width="700" height="170" fill="white" stroke="#cbd5e0" rx="6"/>
<text x="100" y="631" font-size="14" font-weight="700" fill="#1a202c">SWAGE — corrected from F37008 spec</text>
<text x="100" y="656" font-size="12" fill="#374151">A localized lozenge-shape pressed into the web — NOT a continuous stripe.</text>
<text x="100" y="678" font-size="12" fill="#374151">• Approximately 10 mm long along stick × 32 mm tall (covers ~36% of web)</text>
<text x="100" y="696" font-size="12" fill="#374151">• Pressed inward 5 mm — reduces web from 89 to 86.6 mm at the swage</text>
<text x="100" y="714" font-size="12" fill="#374151">• Applied at discrete positions: every ~55 mm near connection ends + at each panel point</text>
<text x="100" y="732" font-size="12" fill="#374151">• In CSV: appears as "SWAGE,xx.x" entries with the position from stick start</text>
<text x="100" y="754" font-size="12" fill="#374151">• Stiffens the web against buckling under axial load</text>
<rect x="800" y="606" width="500" height="170" fill="white" stroke="#16a34a" rx="6"/>
<text x="820" y="631" font-size="14" font-weight="700" fill="#14532d">WEB HOLE replaces BOLT HOLE for connections</text>
<text x="820" y="656" font-size="12" fill="#374151">3 holes Ø3.8 mm at 17 mm pitch on web centreline.</text>
<circle cx="1180" cy="684" r="3.6" fill="url(#hole-rim)"/>
<circle cx="1180" cy="684" r="3" fill="url(#hole-deep)"/>
<circle cx="1180" cy="706" r="3.6" fill="url(#hole-rim)"/>
<circle cx="1180" cy="706" r="3" fill="url(#hole-deep)"/>
<circle cx="1180" cy="728" r="3.6" fill="url(#hole-rim)"/>
<circle cx="1180" cy="728" r="3" fill="url(#hole-deep)"/>
<text x="820" y="684" font-size="12" fill="#374151">Each hole takes a 10g self-drilling screw.</text>
<text x="820" y="706" font-size="12" fill="#374151">3 screws ≈ same shear as one M6 bolt</text>
<text x="820" y="728" font-size="12" fill="#374151">— but spread across 34 mm of web</text>
<text x="820" y="750" font-size="12" fill="#374151">for better load distribution.</text>
<rect x="1320" y="606" width="500" height="170" fill="white" stroke="#cbd5e0" rx="6"/>
<text x="1340" y="631" font-size="14" font-weight="700" fill="#1a202c">SWAGED "C" cross-section</text>
<text x="1340" y="651" font-size="11" fill="#4a5568">86.6 web · 41/38 flange · 12 lip · 5 swage</text>
<path d="M 1700 670.0 L 1700 708.0 Q 1692.5 711 1700 714.0 L 1700 749.0" fill="none" stroke="#3a3f47" stroke-width="2.5"/>
<path d="M 1700 670.0 L 1659.0 670.0 L 1659.0 682.0" fill="none" stroke="#3a3f47" stroke-width="2.5"/>
<path d="M 1700 749.0 L 1662.0 749.0 L 1662.0 737.0" fill="none" stroke="#3a3f47" stroke-width="2.5"/>
<text x="1650" y="681" font-size="9" fill="#6b7280">41</text>
<text x="1650" y="756" font-size="9" fill="#6b7280">38</text>
<text x="1708" y="714" font-size="9" fill="#dc2626" font-weight="700">↑ 5 mm swage</text>
</svg>