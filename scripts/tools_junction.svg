<text x="300.0" y="449.75" text-anchor="middle" font-size="9" fill="#7f1d1d">web cannot lay flat</text>
<text x="510.25" y="260" font-size="11" fill="#475569" font-weight="600">W7 web</text>
<text x="510.25" y="275" font-size="10" fill="#dc2626">no tools applied</text>
