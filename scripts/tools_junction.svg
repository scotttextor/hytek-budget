<text x="1435.0" y="620.0" font-size="11" font-weight="700" fill="#14532d">3 screws driven through</text>
<text x="1435.0" y="634.0" font-size="10" fill="#14532d">middle hole = registration</text>
<text x="1435.0" y="648.0" font-size="10" fill="#14532d">top + bottom = lock angle</text>
<rect x="1150" y="910" width="500" height="80" fill="#dcfce7" stroke="#16a34a" rx="3"/>
<text x="1160" y="930" font-size="12" font-weight="700" fill="#14532d">Result: web sits FLAT on chord</text>
<text x="1160" y="948" font-size="11" fill="#14532d">• Flanges removed in overlap → flat contact</text>
<text x="1160" y="962" font-size="11" fill="#14532d">• Middle screw aligns by design (auto-set-out)</text>
<text x="1160" y="976" font-size="11" fill="#14532d">• 3 screws lock position + angle</text>
